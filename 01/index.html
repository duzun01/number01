<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙舟非遗 - 手势光影交互展</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #f4edd9; font-family: "Microsoft YaHei", serif; }

        /* 背景风格：参照图片的淡雅宣纸色与古风国潮感 */
        .bg-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(244,237,217,0.5) 0%, rgba(218,206,174,0.6) 100%);
            z-index: 1;
        }

        /* 隐藏原生摄像头，只留数据 */
        #video { display: none; }
        
        /* 交互画布，渲染摄像头动态和浪花 */
        #canvas {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: 2;
            opacity: 0.4; /* 摄像头画面半透明，融入古风背景 */
        }

        /* 四张海报的布局矩阵 */
        .poster-grid {
            position: absolute;
            top: 10%; left: 5%; width: 90%; height: 75%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            z-index: 10;
        }

        .poster-card {
            background: #fff;
            border: 3px solid #2b593f; /* 黛绿色边框 */
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            cursor: pointer;
        }

        .poster-card img {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* 选中/握拳放大效果 */
        .poster-card.selected {
            transform: scale(1.15);
            border-color: #e63946; /* 朱红色边框 */
            box-shadow: 0 15px 30px rgba(230,57,70,0.4);
            z-index: 20;
        }

        /* 虚拟鼠标：小白圆球 */
        #cursor-ball {
            position: absolute;
            width: 25px; height: 25px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #2b593f;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(255,255,255,0.8);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }
        
        /* 握拳状态下的小白球样式 */
        #cursor-ball.fist {
            width: 35px; height: 35px;
            background: #e63946;
            border-color: #fff;
        }

        /* 顶部标题栏 */
        .header-title {
            position: absolute;
            top: 3%; left: 5%; color: #2b593f; z-index: 10;
            font-size: 20px; font-weight: bold; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    
    <div id="cursor-ball"></div>

    <div class="header-title">龍舟競渡 · 手势交互演练</div>

    <div class="poster-grid">
        <div class="poster-card" id="poster1">
            < img src="1.png" alt="海报1">
        <div class="poster-card" id="poster2">
            < img src="2.png" alt="海报2">
        </div>
        <div class="poster-card" id="poster3">
            < img src="3.png" alt="海报3">
        </div>
        <div class="poster-card" id="poster4">
            < img src="4.png" alt="海报4">
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const ball = document.getElementById('cursor-ball');
        const cards = document.querySelectorAll('.poster-card');

        // 虚拟鼠标的坐标
        let ballX = window.innerWidth / 2;
        let ballY = window.innerHeight / 2;

        // 1. 开启手机/电脑摄像头
        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: 640, height: 480 },
                audio: false
            });
            video.srcObject = stream;
            return new Promise((resolve) => {
                video.onloadedmetadata = () => { resolve(video); };
            });
        }

        // 2. 传统手势检测逻辑 (当MediaPipe未完全加载完时的备用鼠标模拟)
        window.addEventListener('mousemove', (e) => {
            moveBall(e.clientX, e.clientY);
        });
        
        window.addEventListener('mousedown', () => { toggleFist(true); });
        window.addEventListener('mouseup', () => { toggleFist(false); });

        // 移动小白球并检测碰撞
        function moveBall(x, y) {
            ballX = x; ballY = y;
            ball.style.left = `${x}px`;
            ball.style.top = `${y}px`;
            checkHover();
        }

        // 切换捏合/握拳状态
        function toggleFist(isFist) {
            if (isFist) {
                ball.classList.add('fist');
                // 如果握拳时正好悬停在某张海报上，执行放大
                cards.forEach(card => {
                    if (card.classList.contains('hovered')) {
                        card.classList.add('selected');
                    }
                });
            } else {
                ball.classList.remove('fist');
                cards.forEach(card => card.classList.remove('selected'));
            }
        }

        // 检测小白球是否碰到了海报
        function checkHover() {
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                if (ballX >= rect.left && ballX <= rect.right && ballY >= rect.top && ballY <= rect.bottom) {
                    card.classList.add('hovered');
                } else {
                    card.classList.remove('hovered');
                    card.classList.remove('selected'); // 不悬停时自动回归
                }
            });
        }

        // 3. MediaPipe 智能手势追踪核心
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // 用食指指尖 (Landmark 8) 控制小白球坐标
                // 因为摄像头是镜像的，所以 X 轴要做翻转映射
                const x = (1 - landmarks[8].x) * window.innerWidth;
                const y = landmarks[8].y * window.innerHeight;
                moveBall(x, y);

                // 判断是否握拳：计算大拇指、食指、中指尖和手掌心的距离
                // 这里采用简易算法：如果指尖（8）低于第二关节（6），则视为弯曲（握拳）
                const isFist = landmarks[8].y > landmarks[6].y && landmarks[12].y > landmarks[10].y;
                toggleFist(isFist);
            }
        });

        // 启动摄像头与追踪
        setupCamera().then(() => {
            video.play();
            const camera = new Camera(video, {
                onFrame: async () => {
                    await hands.send({ image: video });
                },
                width: 640,
                height: 480
            });
            camera.start();
        });
    </script>
</body>
</html>
