<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙舟非遗 - 手势光影交互展</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #f4edd9; font-family: "Microsoft YaHei", serif; }

        /* 背景风格：参照图片的淡雅宣纸色 */
        .bg-container {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(244,237,217,0.6) 0%, rgba(218,206,174,0.7) 100%);
            z-index: 1;
        }

        /* 隐藏原生视频，通过Canvas渲染 */
        #video { display: none; }
        
        #canvas {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: 2;
            opacity: 0.35; /* 摄像头画面半透明，融入古风背景 */
        }

        /* 四张海报的布局矩阵 */
        .poster-grid {
            position: absolute;
            top: 12%; left: 5%; width: 90%; height: 75%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            z-index: 10;
        }

        .poster-card {
            background: #fff;
            border: 3px solid #2b593f; /* 黛绿色边框 */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            cursor: pointer;
        }

        .poster-card img {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* 虚拟鼠标悬停在上方时的效果 */
        .poster-card.hovered {
            border-color: #d9a752; /* 金色边框提示 */
            box-shadow: 0 12px 30px rgba(217,167,82,0.5);
        }

        /* 握拳选中放大效果 */
        .poster-card.selected {
            transform: scale(1.12);
            border-color: #e63946; /* 朱红色边框 */
            box-shadow: 0 20px 40px rgba(230,57,70,0.4);
            z-index: 20;
        }

        /* 虚拟鼠标：小白圆球 */
        #cursor-ball {
            position: absolute;
            width: 24px; height: 24px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #2b593f;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(255,255,255,0.8);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }
        
        /* 握拳状态下的小白球样式（变成红色） */
        #cursor-ball.fist {
            width: 36px; height: 36px;
            background: #e63946;
            border-color: #fff;
        }

        .header-title {
            position: absolute;
            top: 4%; left: 5%; color: #2b593f; z-index: 10;
            font-size: 22px; font-weight: bold; letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    
    <div id="cursor-ball"></div>
    <div class="header-title">龍舟競渡 · 现代艺术手势交互展</div>

    <div class="poster-grid">
        <div class="poster-card" id="poster1">
            < img src="1.png" alt="海报1">
        </div>
        <div class="poster-card" id="poster2">
            < img src="2.png" alt="海报2">
        </div>
        <div class="poster-card" id="poster3">
            < img src="3.png" alt="海报3">
        </div>
        <div class="poster-card" id="poster4">
            < img src="4.png" alt="海报4">
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const ball = document.getElementById('cursor-ball');
        const cards = document.querySelectorAll('.poster-card');

        // 绑定音频对象
        const bgMusic = new Audio('bgm.mp3');
        bgMusic.loop = true; 

        let ballX = window.innerWidth / 2;
        let ballY = window.innerHeight / 2;

        // 开启摄像头
        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: 640, height: 480 },
                audio: false
            });
            video.srcObject = stream;
            return new Promise((resolve) => {
                video.onloadedmetadata = () => { resolve(video); };
            });
        }

        // 兼容电脑端鼠标测试
        window.addEventListener('mousemove', (e) => { moveBall(e.clientX, e.clientY); });
        window.addEventListener('mousedown', () => { toggleFist(true); });
        window.addEventListener('mouseup', () => { toggleFist(false); });

        // 控制小白球移动
        function moveBall(x, y) {
            ballX = x; ballY = y;
            ball.style.left = `${x}px`;
            ball.style.top = `${y}px`;
            checkHover();
        }

        // 触发握拳与音乐联动
        function toggleFist(isFist) {
            if (isFist) {
                ball.classList.add('fist');
                cards.forEach(card => {
                    if (card.classList.contains('hovered')) {
                        card.classList.add('selected');
                        // 播放破浪配乐
                        bgMusic.play().catch(err => console.log("等待交互激活音频"));
                    }
                });
            } else {
                ball.classList.remove('fist');
                cards.forEach(card => card.classList.remove('selected'));
                // 停止音乐
                bgMusic.pause();
            }
        }

        // 碰撞检测：小球是否悬停在海报上
        function checkHover() {
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                if (ballX >= rect.left && ballX <= rect.right && ballY >= rect.top && ballY <= rect.bottom) {
                    card.classList.add('hovered');
                } else {
                    card.classList.remove('hovered');
                    card.classList.remove('selected');
                }
            });
        }

        // MediaPipe 智能手势追踪核心
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // 镜像翻转控制
                const x = (1 - landmarks[8].x) * window.innerWidth;
                const y = landmarks[8].y * window.innerHeight;
                moveBall(x, y);

                // 握拳算法：判断食指、中指、无名指尖是否全部收回
                const isFist = landmarks[8].y > landmarks[6].y && 
                               landmarks[12].y > landmarks[10].y && 
                               landmarks[16].y > landmarks[14].y;
                toggleFist(isFist);
            }
        });

        setupCamera().then(() => {
            video.play();
            const camera = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                width: 640, height: 480
            });
            camera.start();
        });
    </script>
</body>
</html>
